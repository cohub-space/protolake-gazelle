name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        
      - name: Build all targets
        run: |
          bazel build //...
          
      - name: Run all tests
        run: |
          bazel test //...
          
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # `gh release create` replaces the deprecated/archived
          # actions/create-release@v1 action. Publishes immediately
          # (no --draft) and uses --generate-notes for the autogenerated
          # changelog from commits since the previous tag.
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            --notes "## Installation

          Add to your \`MODULE.bazel\`:

          \`\`\`starlark
          bazel_dep(name = \"protolake_gazelle\", version = \"0.0.1\")

          git_override(
              module_name = \"protolake_gazelle\",
              remote = \"https://github.com/cohub-space/protolake-gazelle.git\",
              tag = \"$VERSION\",
          )
          \`\`\`

          See README.md for detailed usage instructions."
